version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: keycloak_postgres
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  keycloak:
    image: quay.io/keycloak/keycloak:21.1.1
    container_name: keycloak_service
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin_password
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: password
    ports:
      - "8080:8080"
      - "8443:8443"
    depends_on:
      - postgres

  inference:
    build: .
    image: cvae-inference-service:latest
    container_name: cvae_inference_container
    ports:
      - "8000:8000"
    volumes:
      # Динамическое монтирование локальной директории моделей в контейнер
      - ./models:/app/models
    environment:
      - MODEL_PATH=/app/models/cvae_model.pt
      - SCALER_PATH=/app/models/scaler.pkl
      - KEYCLOAK_URL=http://keycloak:8080
      - KEYCLOAK_REALM=inference
      - KEYCLOAK_CLIENT_ID=inference-client
      - KEYCLOAK_CLIENT_SECRET=client-secret-here
      - BYPASS_KEYCLOAK=true
    depends_on:
      - keycloak

volumes:
  postgres_data: